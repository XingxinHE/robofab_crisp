[workspace]
authors = ["Xingxin HE <xingxin.he@connect.ust.hk>"]
channels = ["robostack-humble", "conda-forge"]
name = "robofab_crisp"
platforms = ["linux-64"]
version = "0.1.0"

[activation.env]
ROS_DOMAIN_ID = "100"
RMW_IMPLEMENTATION = "rmw_zenoh_cpp"
ZENOH_SESSION_CONFIG_URI="./configs/zenoh_client.json5"
CRISP_CONFIG_PATH="./config"

[tasks]
preflight-recording-fr3 = "python -m teleoperations.streamed.preflight"
teleop-streamed-web = "python -m teleoperations.streamed.web_teleop"
teleop-leader-follower-fr3 = "python -m teleoperations.leader_follower.teleop"
teleop-gamepad-fr3 = "bash teleoperations/gamepad/teleop_fr3.sh"
teleop-gamepad-fr3-3cams = "bash teleoperations/gamepad/teleop_fr3_3cams.sh"
record-streamed-fr3 = "bash teleoperations/streamed/record_fr3.sh"
record-leader-follower-fr3 = "bash teleoperations/leader_follower/record_profiled.sh --profile-name record-leader-follower-fr3 --follower-config fr3_right_leader_follower_recording --recording-manager-type keyboard --buttons-hint 0"
record-leader-follower-fr3-buttons = "bash teleoperations/leader_follower/record_profiled.sh --profile-name record-leader-follower-fr3-buttons --follower-config fr3_right_leader_follower_recording --recording-manager-type ros --buttons-hint 1"
record-leader-follower-fr3-3cams = "bash teleoperations/leader_follower/record_profiled.sh --profile-name record-leader-follower-fr3-3cams --follower-config fr3_3_cams_leader_follower_recording --recording-manager-type keyboard --buttons-hint 0"
record-leader-follower-fr3-buttons-3cams = "bash teleoperations/leader_follower/record_profiled.sh --profile-name record-leader-follower-fr3-buttons-3cams --follower-config fr3_3_cams_leader_follower_recording --recording-manager-type ros --buttons-hint 1"
record-transition-keyboard = "python scripts/record_transition_keyboard.py"
record-viser-fr3 = "bash teleoperations/viser/record_fr3.sh"
record-gamepad-fr3 = "bash teleoperations/gamepad/record_fr3.sh"
record-gamepad-fr3-3cams = "bash teleoperations/gamepad/record_fr3_3cams.sh"
clone-dataset-fix-feat = "python scripts/clone_dataset_fix_features.py"
dataset-cleanup-resume = "python scripts/cleanup_lerobot_resume.py"
train-act = "bash scripts/train_act.sh"
preflight-deploy-fr3 = "python -m deployment.act.preflight_fr3"
preflight-deploy-fr3-3cams = "python -m deployment.act.preflight_fr3_3cams"
preflight-deploy-fr3-3cams-gamepad = "python -m deployment.act.preflight_fr3_3cams_gamepad"
deploy-act-fr3 = "bash deployment/act/deploy_profiled.sh --profile-name deploy-act-fr3 --default-repo-id local/fr3_dualcam_streamed_deploy --preflight-module deployment.act.preflight_fr3 --env-namespace \"\" --use-namespace-arg 0 --forbid-env-namespace-arg 0"
deploy-act-fr3-3cams = "bash deployment/act/deploy_profiled.sh --profile-name deploy-act-fr3-3cams --default-repo-id local/fr3_leader_follower_3cams_open_deploy --preflight-module deployment.act.preflight_fr3_3cams --env-namespace right --use-namespace-arg 1 --forbid-env-namespace-arg 0"
deploy-act-fr3-3cams-gamepad = "bash deployment/act/deploy_profiled.sh --profile-name deploy-act-fr3-3cams-gamepad --default-repo-id local/fr3_gamepad_3cams_deploy --preflight-module deployment.act.preflight_fr3_3cams_gamepad --env-namespace \"\" --use-namespace-arg 1 --forbid-env-namespace-arg 1"
episode-stats = "python analysis/episode_stats.py"
episode-video-info = "python analysis/episode_video_info.py"
gripper-align-check = "python analysis/gripper_alignment_check.py"
episode-playback = "python analysis/episode_robot_playback.py"

[dependencies]
python = ">=3.11,<3.12"
ros-humble-desktop = ">=0.10.0,<0.11"
colcon-common-extensions = ">=0.3.0,<0.4"
ros-humble-ros2-control = ">=2.51.0,<3"
ros-humble-ros2-controllers = ">=2.48.0,<3"
ros-humble-image-transport-plugins = ">=2.5.3,<3"
ros-humble-rmw-zenoh-cpp = ">=0.1.2,<0.2"
numpy = "<2"
scipy = ">=1.15.2,<2"
pynput = "*"
rerun-sdk = "=0.22.1"
libstdcxx-ng = ">=12.2.0"
compilers = "*"
cmake = "*"
pkg-config = "*"
make = "*"
ninja = "*"
ros-humble-rqt-gui = ">=1.1.7,<2"

[pypi-dependencies]
torch = { version = "==2.8.0", index = "https://download.pytorch.org/whl/cu128" }
torchvision = { version = "==0.23.0", index = "https://download.pytorch.org/whl/cu128" }
transformers = ">=4.50.3"
crisp-gym = { git = "https://github.com/utiasDSL/crisp_gym.git", rev = "main" }
lerobot = { git = "https://github.com/huggingface/lerobot", rev = "dacd1d7f5c719c3e56d7b7154a751bef6d5bd23c", extras = ["smolvla", "pi0"] }
tyro = "*"
viser = ">=1.0.24, <2"
robot-descriptions = ">=1.23.0, <2"
pygame = ">=2.5.2,<3"
